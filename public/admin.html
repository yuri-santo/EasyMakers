<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>EasyMakers — Painel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
  <div class="bg-pulse" aria-hidden="true"></div>
  <div class="app">
    <aside class="sidebar">
      <a class="brand" href="/" title="Voltar para a página inicial">
        <img src="/assets/img/logo.png" alt="Logo" class="brand-logo">
        <span class="brand-name">EasyMakers</span>
      </a>

      <nav class="nav">
        <button class="nav-btn is-active" data-leftpanel="kanban" title="Kanban">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="7" height="16" rx="2"/><rect x="14" y="4" width="7" height="9" rx="2"/></svg>
          <span>Kanban</span>
        </button>
        <button class="nav-btn" data-leftpanel="calendar" title="Calendário">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
          <span>Calendário</span>
        </button>
        <div class="divider"></div>
        <button class="nav-btn" id="refresh-data" title="Atualizar dados">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
          <span>Atualizar</span>
        </button>
        <a class="nav-btn" href="/" title="Início">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z" fill="currentColor"/></svg>
          <span>Início</span>
        </a>
      </nav>
    </aside>

    <main class="main">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <h1>Ativando modo EASY</h1>
          <p class="subtitle">Kanban • Calendário • Notas</p>
        </div>
        <div class="actions">
          <button id="quick-add" class="btn primary">+ Tarefa</button>
        </div>
      </header>

      <!-- Onda separadora (quebra visual) -->
      <div class="wave-sep" aria-hidden="true">
        <svg viewBox="0 0 1440 96" preserveAspectRatio="none">
          <path d="M0,64 C240,16 480,16 720,48 C960,80 1200,80 1440,48 L1440,96 L0,96 Z" fill="#faf9ff"/>
        </svg>
      </div>

      <section class="workspace">
        <div class="left-panels">
          <!-- KANBAN -->
          <section class="panel is-active" id="panel-kanban">
            <div class="panel-header">
              <h2>Kanban</h2>
            </div>
            <div class="kanban">
              <div class="kan-col">
                <h3>To Do</h3>
                <ul id="todo" class="dropzone"></ul>
                <button class="btn ghost" id="add-todo">+ To Do</button>
              </div>
              <div class="kan-col">
                <h3>Doing</h3>
                <ul id="doing" class="dropzone"></ul>
                <button class="btn ghost" id="add-doing">+ Doing</button>
              </div>
              <div class="kan-col">
                <h3>Done</h3>
                <ul id="done" class="dropzone"></ul>
                <button class="btn ghost" id="add-done">+ Done</button>
              </div>
            </div>
          </section>

          <!-- CALENDÁRIO -->
          <section class="panel" id="panel-calendar">
            <div class="panel-header">
              <h2>Calendário</h2>
              <div class="calendar-inline-form">
                <input type="datetime-local" id="evt-start" />
                <input type="datetime-local" id="evt-end" />
                <input type="text" id="evt-title" placeholder="Título do evento" />
                <button class="btn" id="add-local-event">Adicionar</button>
              </div>
            </div>
            <div id="calendar"></div>
          </section>
        </div>

        <!-- NOTAS -->
        <aside class="notes-pane">
          <div class="panel-header">
            <h2>Notas</h2>
            <div class="note-actions">
              <span id="notes-status" class="status-dot" title="Status de sincronização"></span>
              <button class="btn" id="save-notes">Salvar & Publicar</button>
            </div>
          </div>

          <!-- Toolbar Markdown -->
          <div class="md-toolbar" aria-label="Ferramentas de edição">
            <button class="md-btn" data-md="h1" title="Título #">H1</button>
            <button class="md-btn" data-md="h2" title="Título ##">H2</button>
            <button class="md-btn" data-md="bold" title="Negrito **">B</button>
            <button class="md-btn" data-md="italic" title="Itálico _">I</button>
            <button class="md-btn" data-md="code" title="Código `code`"><code>&lt;/&gt;</code></button>
            <button class="md-btn" data-md="list" title="Lista -">• Lista</button>
            <button class="md-btn" data-md="link" title="Link [t](url)">🔗 Link</button>
          </div>

          <div class="notes-split">
            <textarea id="notes" placeholder="Escreva em Markdown: **negrito**, _itálico_, listas (- item), # Títulos, [link](https://)"></textarea>
            <div id="notes-preview" class="notes-preview"></div>
          </div>

          <h3 class="forum-title">Suas notas</h3>
          <div id="notes-feed" class="notes-feed"></div>
          <div id="notes-empty" class="empty-state" hidden>
            <div class="empty-ico">📝</div>
            <p>Sem posts ainda. Escreva algo e clique “Salvar & Publicar”.</p>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <!-- FullCalendar v6 (somente JS) -->
  <script src="/vendor/fullcalendar/index.global.min.js"></script>

  <!-- Modal de tarefa -->
  <template id="task-modal-tpl">
    <div class="modal-backdrop">
      <div class="modal">
        <button class="modal-x" aria-label="Fechar">×</button>
        <h3 id="task-modal-title">Editar tarefa</h3>
        <label>Título
          <input type="text" id="fm-title" />
        </label>
        <label>Observação
          <textarea id="fm-observation" rows="3"></textarea>
        </label>
        <div class="row">
          <label>Início
            <input type="date" id="fm-startDate" />
          </label>
          <label>Término
            <input type="date" id="fm-dueDate" />
          </label>
        </div>
        <div class="modal-actions">
          <button class="btn" id="fm-save">Salvar</button>
          <button class="btn ghost" id="fm-cancel">Cancelar</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Modal de edição de nota -->
  <template id="note-modal-tpl">
    <div class="modal-backdrop">
      <div class="modal">
        <button class="modal-x" aria-label="Fechar">×</button>
        <h3>Editar nota</h3>
        <label>Título (opcional)
          <input type="text" id="fn-title" />
        </label>
        <label>Markdown
          <textarea id="fn-markdown" rows="8"></textarea>
        </label>
        <div class="modal-actions">
          <button class="btn" id="fn-save">Salvar</button>
          <button class="btn ghost" id="fn-cancel">Cancelar</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Toasts -->
  <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script src="/assets/js/admin.js"></script>
</body>
</html>
