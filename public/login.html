<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Entrar - EasyMakers</title>
  <link rel="icon" href="logo.ico" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/site-shell.css" />
  <style>
    :root {
      --brand: #6f42c1;
      --brand-2: #3e6ae1;
      --ink: #231f20;
      --muted: #6b7280;
      --line: rgba(15, 23, 42, 0.08);
      --card: rgba(255, 255, 255, 0.94);
      --radius: 22px;
      --shadow: 0 24px 48px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(111, 66, 193, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(62, 106, 225, 0.14), transparent 28%),
        linear-gradient(180deg, #eef3ff 0%, #f8fbff 28%, #ffffff 100%);
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 18% 24%, rgba(111, 66, 193, 0.16), transparent 26%),
        radial-gradient(circle at 82% 72%, rgba(62, 106, 225, 0.14), transparent 28%);
      pointer-events: none;
    }

    .wrap {
      min-height: calc(100vh - var(--shell-nav-height));
      display: grid;
      place-items: center;
      padding: 1.4rem;
    }

    .card {
      width: min(100%, 520px);
      padding: 1.7rem;
      border-radius: var(--radius);
      border: 1px solid rgba(226, 232, 240, 0.88);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(120%);
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 0.9rem;
      padding: 0.42rem 0.8rem;
      border-radius: 999px;
      background: rgba(111, 66, 193, 0.08);
      color: var(--brand);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 1rem;
    }

    .brand img {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2vw, 2rem);
    }

    .brand p {
      margin: 0.25rem 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    label {
      display: block;
      margin: 0.9rem 0 0.35rem;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .in {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.85rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: #ffffff;
      transition: border-color 220ms ease, box-shadow 220ms ease;
    }

    .in:focus-within {
      border-color: rgba(111, 66, 193, 0.42);
      box-shadow: 0 0 0 0.2rem rgba(111, 66, 193, 0.1);
    }

    .in input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      font: inherit;
    }

    .eye {
      cursor: pointer;
      color: var(--brand);
      user-select: none;
    }

    .btn {
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.95rem 1rem;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #ffffff;
      font-size: 0.98rem;
      font-weight: 800;
      box-shadow: 0 16px 34px rgba(62, 106, 225, 0.22);
      cursor: pointer;
    }

    .err {
      min-height: 1.4rem;
      margin-top: 0.9rem;
      color: #b91c1c;
      font-size: 0.92rem;
    }

    .links {
      display: flex;
      justify-content: space-between;
      gap: 0.9rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .links a {
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
    }

    .foot {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .card {
        padding: 1.2rem;
      }

      .links {
        flex-direction: column;
      }
    }
  </style>
</head>
<body data-page="login">
  <div id="site-shell-nav"></div>
  <div id="page-transition-layer" class="page-transition-layer" aria-hidden="true"></div>
  <div class="bg" aria-hidden="true"></div>

  <div class="wrap">
    <main class="card" role="main" aria-label="Autenticacao">
      <span class="eyebrow">Acesso restrito</span>
      <header class="brand">
        <img src="/assets/img/logo.png" alt="Logo EasyMakers" />
        <div>
          <h1>Entrar no painel</h1>
          <p>Use seu login para acessar a area administrativa da EasyMakers.</p>
        </div>
      </header>

      <label for="email">Email</label>
      <div class="in">
        <input id="email" type="email" autocomplete="email" inputmode="email" placeholder="voce@empresa.com" />
      </div>

      <label for="password">Senha</label>
      <div class="in">
        <input id="password" type="password" autocomplete="current-password" placeholder="Digite sua senha" />
        <span id="togglePass" class="eye" title="Mostrar ou ocultar senha">Ver</span>
      </div>

      <button id="login" class="btn" type="button">Entrar</button>
      <div id="err" class="err"></div>

      <div class="links">
        <a href="/">Voltar para o inicio</a>
        <a href="/logout" title="Limpa a sessao atual">Limpar sessao</a>
      </div>

      <div class="foot">Ambiente interno EasyMakers</div>
    </main>
  </div>

  <script type="module" src="/assets/js/site-shell.js"></script>
  <script type="module" src="/assets/js/login.js"></script>
</body>
</html>
