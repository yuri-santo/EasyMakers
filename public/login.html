<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <title>Entrar — EasyMakers</title>

  <link rel="icon" href="logo.ico" type="image/x-icon" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --brand: #6f42c1;
      --brand-2: #3e6ae1;
      --ink: #231f20;
      --muted: #6b6b6b;
      --bg: #ffffff;
      --card: #ffffff;
      --divider: rgba(0, 0, 0, .08);
      --radius: 16px;
      --shadow: 0 12px 30px rgba(0, 0, 0, .08), 0 4px 10px rgba(0, 0, 0, .06);
      --transition: .25s ease;
    }

    * {
      box-sizing: border-box
    }

    /* base */
    body {
      margin: 0;
      font-family: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--brand-2);
      min-height: 100dvh;
      /* corrige altura em iOS/Android */
    }

    /* bg com leve animação (desativa se prefers-reduced-motion) */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(60vmax 60vmax at 18% 28%, rgba(111, 66, 193, .22), transparent 60%),
        radial-gradient(50vmax 50vmax at 82% 72%, rgba(62, 106, 225, .22), transparent 60%),
        linear-gradient(180deg, #f7f8ff, #f1f2ff 25%, #ffffff 55%);
      animation: pulse 10s infinite alternate ease-in-out;
    }

    @keyframes pulse {
      0% {
        filter: saturate(1) hue-rotate(0deg);
      }

      100% {
        filter: saturate(1.15) hue-rotate(-6deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg {
        animation: none
      }
    }

    /* container */
    .wrap {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(16px, 3vw, 32px) clamp(12px, 4vw, 24px);
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      /* notch friendly */
    }

    /* cartão */
    .card {
      width: clamp(300px, 92vw, 520px);
      /* cresce suave entre mobile e desktop */
      background: var(--card);
      border: 1px solid var(--divider);
      border-radius: var(--radius);
      padding: clamp(18px, 3vw, 26px);
      box-shadow: var(--shadow);
      backdrop-filter: saturate(1.05);
    }

    /* topo */
    .brand {
      display: flex;
      align-items: center;
      gap: clamp(8px, 2vw, 12px);
      margin: 0 0 clamp(6px, 1.8vw, 12px);
    }

    .brand img {
      width: clamp(36px, 8vw, 56px);
      height: clamp(36px, 8vw, 56px);
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.25rem, 1rem + 1vw, 1.75rem);
      font-weight: 800;
      letter-spacing: .2px;
    }

    /* campos */
    label {
      display: block;
      font-size: clamp(.85rem, .8rem + .25vw, .95rem);
      color: var(--muted);
      margin: .55rem 0 .35rem;
    }

    .in {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: clamp(10px, 1.2vw, 12px) clamp(12px, 1.4vw, 14px);
      background: #fff;
      transition: border var(--transition), box-shadow var(--transition);
    }

    .in:focus-within {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(111, 66, 193, .12)
    }

    .in input {
      border: 0;
      outline: 0;
      width: 100%;
      font-size: clamp(1rem, .95rem + .3vw, 1.05rem);
      background: transparent;
      line-height: 1.3;
      min-height: 40px;
    }

    .eye {
      cursor: pointer;
      user-select: none;
      opacity: .7;
      font-size: 1rem
    }

    .eye:hover {
      opacity: 1
    }

    /* ação */
    .btn {
      width: 100%;
      margin-top: clamp(10px, 1.8vw, 14px);
      padding: clamp(12px, 1.5vw, 14px) clamp(14px, 2vw, 16px);
      border: 0;
      border-radius: 12px;
      background: linear-gradient(90deg, var(--brand), #7a57d4);
      color: #fff;
      font-weight: 800;
      letter-spacing: .2px;
      cursor: pointer;
      font-size: clamp(.95rem, .9rem + .25vw, 1rem);
      transition: transform var(--transition), filter var(--transition);
    }

    .btn:hover {
      filter: brightness(.98);
      transform: translateY(-1px)
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none
    }

    /* mensagens e links */
    .err {
      color: #a33;
      margin-top: 10px;
      min-height: 1.1em;
      font-size: clamp(.9rem, .85rem + .2vw, .95rem)
    }

    .links {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
      font-size: clamp(.9rem, .85rem + .2vw, .95rem);
    }

    .links a {
      color: var(--brand-2);
      text-decoration: none
    }

    .links a:hover {
      text-decoration: underline
    }

    /* rodapé */
    .foot {
      text-align: center;
      margin-top: 10px;
      color: #808080;
      font-size: clamp(.8rem, .75rem + .25vw, .9rem)
    }

    /* otimizações por breakpoint */
    @media (max-width: 420px) {
      .links {
        flex-direction: column;
        align-items: stretch;
        gap: 8px
      }

      .links a {
        text-align: center;
        padding: 10px 8px;
        background: #f7f7fb;
        border-radius: 10px;
      }
    }

    @media (min-width: 768px) {
      .card {
        width: clamp(380px, 44vw, 520px)
      }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="wrap">
    <main class="card" role="main" aria-label="Autenticação">
      <header class="brand">
        <img src="/assets/img/logo.png" alt="Logo EasyMakers" />
        <h1>Entrar</h1>
      </header>

      <label for="email">Email</label>
      <div class="in">
        <input id="email" type="email" autocomplete="email" inputmode="email" placeholder="voce@empresa.com" />
      </div>

      <label for="password">Senha</label>
      <div class="in">
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
        <span id="togglePass" class="eye" title="Mostrar/ocultar senha">👁️</span>
      </div>

      <button id="login" class="btn">Entrar</button>

      <div id="err" class="err"></div>

      <div class="links">
        <a href="/">← Início</a>
        <a href="/logout" title="Limpa sessão atual">Limpar sessão</a>
      </div>

      <div class="foot">Acesso restrito • EasyMakers</div>
    </main>
  </div>

  <script type="module" src="/assets/js/login.js"></script>
</body>

</html>
